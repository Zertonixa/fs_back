name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

permissions:
  contents: read

jobs:
  backend-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          pip install uv

      - name: Install backend dependencies
        run: uv sync --locked

      - name: Check formatting with Ruff
        run: uv run ruff format --check .

      - name: Run Ruff lint
        run: uv run ruff check .

      - name: Prepare test environment
        run: cp .env.test .env

      - name: Run tests with test infrastructure
        run: >
          docker compose -f infra/test/docker-compose.test.yml
          up --build --abort-on-container-exit --exit-code-from tests tests

      - name: Cleanup test infrastructure
        if: always()
        run: docker compose -f infra/test/docker-compose.test.yml down -v --remove-orphans

      - name: Build backend Docker image
        run: docker build -f infra/Dockerfile -t backend-ci:${{ github.sha }} .
